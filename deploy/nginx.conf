server {
    listen 80;
    server_name _;   # Replace with your IP or domain e.g. jobfetcher.aakashjain.com

    # Optional: basic auth to protect the dashboard
    # auth_basic "Job Dashboard";
    # auth_basic_user_file /etc/nginx/.htpasswd;
    # To set up: sudo apt install apache2-utils && sudo htpasswd -c /etc/nginx/.htpasswd aakash

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;

        # Allow large file uploads (resume)
        client_max_body_size 10M;

        # Timeout for long-running requests (pipeline trigger)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Logs
    access_log /var/log/nginx/jobfetcher-access.log;
    error_log  /var/log/nginx/jobfetcher-error.log;
}
