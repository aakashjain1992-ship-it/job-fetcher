name: Job Fetcher Pipeline

on:
  schedule:
    # Runs 3x daily — adjust to your timezone
    # Default: 00:30, 08:30, 16:30 UTC
    - cron: '30 0 * * *'
    - cron: '30 8 * * *'
    - cron: '30 16 * * *'

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      skip_career_pages:
        description: 'Skip career page scraping'
        required: false
        default: 'false'
        type: boolean
      skip_ratings:
        description: 'Skip Glassdoor ratings enrichment'
        required: false
        default: 'false'
        type: boolean
      test_mode:
        description: 'Test mode — skips fetchers, tests enrichment only'
        required: false
        default: 'false'
        type: boolean

jobs:
  fetch-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data

      - name: Restore dedup cache
        uses: actions/cache@v3
        with:
          path: data/dedup_cache.db
          key: dedup-cache-${{ github.run_number }}
          restore-keys: |
            dedup-cache-

      - name: Run job fetcher pipeline
        env:
          # Required
          ANTHROPIC_API_KEY:            ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON:  ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SPREADSHEET_ID:        ${{ secrets.GOOGLE_SPREADSHEET_ID }}
          # Optional
          SERPAPI_KEY:                   ${{ secrets.SERPAPI_KEY }}
          RESEND_API_KEY:               ${{ secrets.RESEND_API_KEY }}
          DIGEST_EMAIL:                 ${{ secrets.DIGEST_EMAIL }}
          # Candidate profile (override YAML values)
          CANDIDATE_NAME:               ${{ secrets.CANDIDATE_NAME }}
          CANDIDATE_CURRENT_TITLE:      ${{ secrets.CANDIDATE_CURRENT_TITLE }}
          CANDIDATE_CURRENT_CO:         ${{ secrets.CANDIDATE_CURRENT_CO }}
          CANDIDATE_YEARS_EXP:          ${{ secrets.CANDIDATE_YEARS_EXP }}
          CANDIDATE_LOCATION:           ${{ secrets.CANDIDATE_LOCATION }}
          CANDIDATE_TARGET_CTC:         ${{ secrets.CANDIDATE_TARGET_CTC }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
            ARGS="--test"
          else
            if [ "${{ github.event.inputs.skip_career_pages }}" = "true" ]; then
              ARGS="$ARGS --skip-career-pages"
            fi
            if [ "${{ github.event.inputs.skip_ratings }}" = "true" ]; then
              ARGS="$ARGS --skip-ratings"
            fi
          fi
          python main.py $ARGS

      - name: Save dedup cache
        uses: actions/cache@v3
        if: always()
        with:
          path: data/dedup_cache.db
          key: dedup-cache-${{ github.run_number }}

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Job fetcher failed — ${new Date().toISOString().slice(0,10)}`,
              body: `Pipeline run failed. Check the [Actions log](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
              labels: ['bug', 'automated']
            })
